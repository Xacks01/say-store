<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listen Now - Sa-Young</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>

<body class="listen-page">

    <!-- Blurred Background -->
    <div class="listen-bg-blur" style="background-image: url('images/album_cover_1.png');"></div>

    <div class="listen-container">
        <!-- Cover Art -->
        <div class="listen-art">
            <img src="images/album_cover_1.png" alt="Sa-Young - ILEKE">
            <div class="play-overlay">
                <i class="ri-play-fill"></i>
            </div>
        </div>

        <!-- Song Info -->
        <div class="listen-info">
            <h1>Sa-Young - ILEKE</h1>
            <p>Choose music service</p>
        </div>

        <!-- Service Card -->
        <div class="service-card">
            <!-- Spotify -->
            <a href="https://open.spotify.com" target="_blank" rel="noopener noreferrer" class="service-item">
                <div class="service-brand">
                    <i class="ri-spotify-fill brand-spotify"></i>
                    <span>Spotify</span>
                </div>
                <div class="btn-service">Play</div>
            </a>

            <!-- Apple Music -->
            <a href="https://music.apple.com" target="_blank" rel="noopener noreferrer" class="service-item">
                <div class="service-brand">
                    <i class="ri-apple-fill brand-apple"></i>
                    <span>Apple Music</span>
                </div>
                <div class="btn-service">Play</div>
            </a>

            <!-- YouTube Music -->
            <a href="https://music.youtube.com" target="_blank" rel="noopener noreferrer" class="service-item">
                <div class="service-brand">
                    <i class="ri-youtube-fill brand-youtube"></i>
                    <span>YouTube Music</span>
                </div>
                <div class="btn-service">Play</div>
            </a>

            <!-- Amazon Music -->
            <a href="https://music.amazon.com" target="_blank" rel="noopener noreferrer" class="service-item">
                <div class="service-brand">
                    <i class="ri-amazon-fill brand-amazon"></i>
                    <span>Amazon Music</span>
                </div>
                <div class="btn-service">Play</div>
            </a>

            <!-- Deezer -->
            <a href="https://www.deezer.com" target="_blank" rel="noopener noreferrer" class="service-item">
                <div class="service-brand">
                    <i class="ri-mv-fill brand-deezer"></i>
                    <span>Deezer</span>
                </div>
                <div class="btn-service">Play</div>
            </a>

            <!-- Audiomack -->
            <a href="https://audiomack.com" target="_blank" rel="noopener noreferrer" class="service-item">
                <div class="service-brand">
                    <i class="ri-disc-fill brand-audiomack"></i>
                    <span>Audiomack</span>
                </div>
                <div class="btn-service">Play</div>
            </a>
        </div>

        <!-- Footer -->
        <div class="listen-footer">
            <p>You have accepted the use of cookies for this service. <a href="#">Click here</a> to manage your
                permissions.</p>
            <p>This page may contain affiliate links.</p>
        </div>
    </div>

</body>

</html>
